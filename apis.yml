- name: Yardi Voyager Commercial Data API
  description: >-
    Web service interface that provides the ability to export commercial data
    from Yardi Voyager databases, including property, unit, lease, and rent roll
    information. Built on the OSCRE standard with Yardi-specific extensions, this
    API expands existing services geared towards financial transactions and
    facilities management.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.yardi.com/news/press-releases/yardi-adds-commercial-data-interface-to-voyager-standard-interface-partnership-program/
  baseURL: https://api.yardi.com
  tags:
  - Commercial
  - Data Export
  - Leasing
  - OSCRE
  properties:
  - type: Documentation
    url: https://www.yardi.com/services/interfaces/standard-interface-options/
  - type: Getting Started
    url: https://www.yardi.com/company/become-an-interface-partner/
- name: Yardi RENTCafe API
  description: >-
    API for online rental applications, payments, and resident portal
    functionality for multifamily properties. RENTCafe APIv2 provides
    transaction-based pricing with an annual price cap, enabling vendors to
    integrate leasing, marketing, and resident services into their applications.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.rentcafe.com/
  baseURL: https://api.rentcafe.com
  tags:
