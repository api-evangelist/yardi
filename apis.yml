- name: Yardi Investment Manager API
  description: >-
    API for investment and asset management functions including deal tracking,
    investor reporting, and portfolio analytics. Provides programmatic access to
    investment management data within the Yardi Voyager platform.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
