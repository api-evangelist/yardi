  - Webhooks
  - Booking
  properties:
  - type: Documentation
    url: https://www.yardikube.com/integrations-api/
- name: Yardi Senior Living EHR API
  description: >-
    Interface API for Yardi's Electronic Health Records platform designed for
    senior living communities. Supports secure data exchange with pharmacy
    networks, laboratory systems, and other healthcare partners through
    standardized interfaces including NCPDP 10.6 SCRIPT compliance.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.yardi.com/product/ehr/
  baseURL: https://api.yardi.com
  tags:
