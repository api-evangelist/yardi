- name: Yardi Store Web Services API
  description: >-
    SOAP-based API for Yardi's self-storage management platform, formerly known
    as CenterShift. The SWS2 API provides tokenized authentication and access to
    store management methods for creating custom applications and websites that
    interact with Yardi Store Enterprise and Store Advantage systems.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://centershiftdevx.com/
  baseURL: https://api.yardi.com
  tags:
  - Self Storage
  - Store Management
  - SOAP
  - Reservations
  properties:
  - type: Documentation
    url: https://centershiftdevx.com/2015/01/22/sws2-api-documentation/
  - type: Reference
    url: https://centershiftdevx.com/2017/01/23/end-points/
  - type: Getting Started
