name: Yardi
description: Yardi develops and supports industry-leading investment and property management software for all types and sizes of real estate companies. The platform includes solutions for residential, commercial, public housing, affordable housing, and military housing management.
image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
url: https://www.yardi.com
created: '2025'
modified: '2026-03-04'
apis:
- name: Yardi Voyager API
  description: >-
    Core property management platform API providing access to accounting,
    operations, and reporting functionality for real estate portfolios. Yardi
    Voyager uses SOAP-based web services defined via WSDL, with interfaces for
    billing and payments, common data, service requests, vendor invoicing, job
    cost, and commercial data export.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.yardi.com/products/voyager/
  baseURL: https://api.yardi.com
  tags:
  - Property Management
  - Accounting
  - Real Estate
  - Commercial
  - Residential
