- name: Yardi Maintenance IQ API
  description: >-
    Maintenance and work order management API enabling integration with
    maintenance operations, service requests, and vendor management. Part of the
    Voyager Standard Interface Partnership Program, this API supports creating
    and updating work orders between Yardi and third-party systems.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.yardi.com/products/maintenance-iq/
  baseURL: https://api.yardi.com/maintenance
