  - type: Support
    url: https://centershiftdevx.com/2011/06/20/contacting-centershift/
- name: Yardi Kube API
  description: >-
    API and webhook integration for Yardi Kube, the coworking and flexible
    workspace management platform. Enables connecting third-party applications
    with Yardi Kube for member management, billing, space booking, access
    control, and CRM integrations.
  image: https://www.yardi.com/wp-content/uploads/2023/01/yardi-logo.svg
  humanURL: https://www.yardikube.com/integrations-api/
  baseURL: https://api.yardikube.com
