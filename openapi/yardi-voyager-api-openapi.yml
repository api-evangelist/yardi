        ServerName:
          type: string
          description: Yardi database server name
        Database:
          type: string
          description: Yardi database name
        Platform:
          type: string
          description: Database platform identifier
        YardiPropertyId:
          type: string
          description: Yardi property identifier
        InterfaceEntity:
          type: string
          description: Interface entity code
        InterfaceLicense:
          type: string
          description: Interface license key
      required:
        - UserName
        - Password
        - ServerName
        - Database
        - Platform
        - YardiPropertyId
        - InterfaceEntity
        - InterfaceLicense
    GetServiceRequestsRequest:
      type: object
      description: >-
        SOAP request for retrieving service requests and work orders.
      properties:
        UserName:
          type: string
          description: Yardi API user name
        Password:
          type: string
          description: Yardi API password
        ServerName:
          type: string
          description: Yardi database server name
        Database:
          type: string
          description: Yardi database name
        Platform:
          type: string
          description: Database platform identifier
        YardiPropertyId:
          type: string
          description: Yardi property identifier
        InterfaceEntity:
          type: string
          description: Interface entity code
        InterfaceLicense:
          type: string
          description: Interface license key
        FromDate:
          type: string
          format: date
          description: Start date for service request query
        ToDate:
          type: string
          format: date
          description: End date for service request query
      required:
        - UserName
        - Password
        - ServerName
        - Database
        - Platform
        - YardiPropertyId
        - InterfaceEntity
        - InterfaceLicense
    ImportServiceRequestsRequest:
      type: object
      description: >-
        SOAP request for creating or updating service requests in Voyager.
      properties:
        UserName:
          type: string
          description: Yardi API user name
        Password:
          type: string
          description: Yardi API password
        ServerName:
          type: string
          description: Yardi database server name
        Database:
          type: string
          description: Yardi database name
        Platform:
          type: string
          description: Database platform identifier
        YardiPropertyId:
          type: string
          description: Yardi property identifier
        InterfaceEntity:
          type: string
          description: Interface entity code
        InterfaceLicense:
          type: string
          description: Interface license key
        ServiceRequestXml:
          type: string
          description: XML payload containing service request data to import
      required:
        - UserName
        - Password
        - ServerName
        - Database
        - Platform
        - YardiPropertyId
        - InterfaceEntity
        - InterfaceLicense
        - ServiceRequestXml
    GetVendorInvoicesRequest:
      type: object
      description: >-
        SOAP request for retrieving vendor invoice records.
      properties:
        UserName:
          type: string
          description: Yardi API user name
        Password:
          type: string
          description: Yardi API password
        ServerName:
          type: string
          description: Yardi database server name
        Database:
          type: string
          description: Yardi database name
        Platform:
          type: string
          description: Database platform identifier
        YardiPropertyId:
          type: string
          description: Yardi property identifier
        InterfaceEntity:
          type: string
          description: Interface entity code
        InterfaceLicense:
          type: string
          description: Interface license key
        FromDate:
          type: string
          format: date
          description: Start date for invoice query
        ToDate:
          type: string
          format: date
          description: End date for invoice query
      required:
