        - Password
        - ServerName
        - Database
        - Platform
        - YardiPropertyId
        - InterfaceEntity
        - InterfaceLicense
        - InvoiceXml
    GetJobCostDataRequest:
      type: object
      description: >-
        SOAP request for retrieving job cost tracking data.
      properties:
        UserName:
          type: string
          description: Yardi API user name
        Password:
          type: string
          description: Yardi API password
        ServerName:
          type: string
          description: Yardi database server name
        Database:
          type: string
          description: Yardi database name
        Platform:
          type: string
          description: Database platform identifier
        YardiPropertyId:
          type: string
          description: Yardi property identifier
        InterfaceEntity:
          type: string
          description: Interface entity code
        InterfaceLicense:
          type: string
          description: Interface license key
        JobId:
          type: string
          description: Job or project identifier
      required:
        - UserName
        - Password
        - ServerName
        - Database
        - Platform
        - YardiPropertyId
        - InterfaceEntity
        - InterfaceLicense
    TransactionResponse:
      type: object
      description: >-
        SOAP response containing resident transaction data in XML format.
      properties:
        TransactionXmlResponse:
          type: string
          description: XML response containing transaction records
    BudgetDataResponse:
      type: object
      description: >-
        SOAP response containing budget data in XML format.
      properties:
        BudgetDataXmlResponse:
          type: string
          description: XML response containing budget records
    PropertyConfigurationsResponse:
      type: object
      description: >-
        SOAP response containing property configuration data.
      properties:
        PropertyConfigurationsXmlResponse:
          type: string
          description: XML response containing property configuration records
    UnitInformationResponse:
      type: object
      description: >-
        SOAP response containing unit information data.
      properties:
        UnitInformationXmlResponse:
          type: string
          description: XML response containing unit records
    TenantsResponse:
      type: object
      description: >-
        SOAP response containing tenant data.
      properties:
        TenantsXmlResponse:
          type: string
          description: XML response containing tenant records
    ChartOfAccountsResponse:
      type: object
      description: >-
        SOAP response containing chart of accounts data.
      properties:
        ChartOfAccountsXmlResponse:
          type: string
          description: XML response containing account records
    ServiceRequestsResponse:
      type: object
      description: >-
        SOAP response containing service request and work order data.
      properties:
        ServiceRequestsXmlResponse:
          type: string
          description: XML response containing service request records
    VendorInvoicesResponse:
      type: object
      description: >-
        SOAP response containing vendor invoice data.
      properties:
        VendorInvoicesXmlResponse:
          type: string
          description: XML response containing vendor invoice records
    JobCostDataResponse:
      type: object
      description: >-
